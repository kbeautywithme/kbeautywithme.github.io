    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kbeauty With Me - Product list</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background-color: #fff; color: #333; }
        header { border-bottom: 1px solid #eee; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: #c2c395; }
        .nav-links { display: flex; gap: 30px; }
        main { padding: 50px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        .product-item { border: 1px solid #f0f0f0; border-radius: 8px; overflow: hidden; padding: 10px; }
        .product-image img { width: 100%; height: auto; }

        /* --- Поп-ап Дизайн --- */
        .kb-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 99999; justify-content: center; align-items: center;
        }
        .kb-modal {
            background: #fff; width: 90%; max-width: 750px; border-radius: 12px; display: flex; overflow: hidden; position: relative;
        }
        .kb-close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; z-index: 10; color: #331d0d; }
        .kb-image-side { width: 48%; background: url('Gemini_Generated_Image_ (1).png') center/cover no-repeat; min-height: 400px; }
        .kb-content-side { width: 52%; background: #f4eade; padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .kb-title { font-family: 'Playfair Display', serif; font-size: 28px; color: #331d0d; margin-bottom: 15px; }
        .kb-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #b37341; border-radius: 8px; box-sizing: border-box; }
        .kb-button { width: 100%; padding: 12px; background: #b37341; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .kb-promo-box { font-size: 22px; font-weight: bold; color: #b37341; border: 2px dashed #b37341; padding: 10px; margin: 15px 0; background: #fff; letter-spacing: 2px; }
        
        @media (max-width: 768px) {
            .kb-modal { flex-direction: column; }
            .kb-image-side { width: 100%; min-height: 180px; }
            .kb-content-side { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Kbeauty With Me</div>
        <nav class="nav-links">
            <a href="#">NEW</a><a href="#">SALE</a><a href="#">BEST</a>
        </nav>
        <div>🔍 👤 🛒</div>
    </header>

    <main>
        <div class="page-title">All Products</div>
        <div class="product-grid">
            <div class="product-item">
                <div class="product-image"><img src="https://via.placeholder.com/250" alt="Product"></div>
                <div class="product-name">345 Relief Cream</div>
                <div style="font-weight: bold;">45,000₮</div>
            </div>
        </div>
    </main>

    <div class="kb-overlay" id="kbOverlay">
        <div class="kb-modal">
            <span class="kb-close" onclick="kbClose()">&times;</span>
            <div class="kb-image-side"></div>
            <div class="kb-content-side">
                <div id="kbStep1">
                    <div class="kb-title">Unlock Your Glow</div>
                    <input type="email" id="kbEmailField" class="kb-input" placeholder="Your Email">
                    <button class="kb-button" onclick="kbGoNext()">Join in</button>
                </div>
                <div id="kbStep2" style="display: none;">
                    <div class="kb-title">You're in! ✨</div>
                    <p>Use this code:</p>
                    <div class="kb-promo-box">GLOW5OFF</div>
                    <button class="kb-button" onclick="kbClose()">Start Shopping</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 3 секундын дараа поп-ап нээгдэнэ
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('kbOverlay').style.display = 'flex';
            }, 3000);
        });

        function kbGoNext() {
            const email = document.getElementById('kbEmailField').value;
            if (email.includes('@')) {
                document.getElementById('kbStep1').style.display = 'none';
                document.getElementById('kbStep2').style.display = 'block';
            } else {
                alert("Please enter a valid email.");
            }
        }

        function kbClose() {
            document.getElementById('kbOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
